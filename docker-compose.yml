name: pepecoin

services:
  core:
    image: pepeenthusiast/pepecoin-core:latest
    restart: unless-stopped
    command:
        -printtoconsole
        -server=1
        -txindex=1
        -rpcallowip=0.0.0.0/0
        -rpcuser=rpc
        -rpcpassword=rpcp
    volumes:
        - pepecoin_data:/home/pepecoin/.pepecoin
  electrs:
    image: pepeenthusiast/electrs:latest
    restart: unless-stopped
    ports:
      - 3000:3000
    command: |
      --jsonrpc-import
      --address-search
      --electrum-rpc-addr 0.0.0.0:50001
      --daemon-rpc-addr core:33873
      --daemon-dir /.pepecoin
      --cookie rpc:rpcp
      --db-dir /electrs
      --cors '*'
    volumes:
    - pepecoin_data:/.pepecoin
    - electrs_data:/electrs

volumes:
  pepecoin_data:
  electrs_data: